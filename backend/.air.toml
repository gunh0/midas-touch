root = "."
tmp_dir = "tmp"

[build]
  cmd = "$(go env GOPATH)/bin/swag init -g main.go -o docs --parseInternal --outputTypes json,yaml && go build -o ./tmp/main ."
  bin = "./tmp/main"
  include_ext = ["go", "tpl", "tmpl", "html", "json"]
  exclude_dir = ["tmp", "vendor", "docs"]
  delay = 500
  stop_on_error = true

[color]
  main = "yellow"
  watcher = "cyan"
  build = "green"
  runner = "magenta"

[log]
  time = true
